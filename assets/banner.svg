<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <!-- decorative network nodes representing ML -->
  <g stroke="#38bdf8" stroke-width="1.5" opacity="0.35">
    <line x1="880" y1="60" x2="960" y2="110"/>
    <line x1="960" y1="110" x2="920" y2="180"/>
    <line x1="920" y1="180" x2="1040" y2="190"/>
    <line x1="1040" y1="190" x2="1080" y2="100"/>
    <line x1="1080" y1="100" x2="960" y2="110"/>
    <line x1="880" y1="60" x2="1080" y2="100"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="880" cy="60" r="6"/>
    <circle cx="960" cy="110" r="8"/>
    <circle cx="920" cy="180" r="5"/>
    <circle cx="1040" cy="190" r="7"/>
    <circle cx="1080" cy="100" r="6"/>
  </g>

  <!-- coin / finance icon -->
  <g transform="translate(90,90)">
    <circle cx="0" cy="0" r="46" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#22d3ee" text-anchor="middle">$</text>
  </g>

  <text x="200" y="105" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#f8fafc">CustomerInsight-AI</text>
  <text x="200" y="145" font-family="Arial, sans-serif" font-size="22" fill="#93c5fd">Predicting Loan Approval with Machine Learning</text>

  <rect x="200" y="170" width="640" height="4" rx="2" fill="url(#accent)"/>
</svg>
