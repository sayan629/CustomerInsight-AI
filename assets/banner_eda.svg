<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" rx="16" fill="url(#bg2)"/>

  <!-- mini bar chart icon -->
  <g transform="translate(950,40)">
    <rect x="0" y="80" width="26" height="60" rx="4" fill="url(#bar)"/>
    <rect x="36" y="50" width="26" height="90" rx="4" fill="url(#bar)" opacity="0.85"/>
    <rect x="72" y="20" width="26" height="120" rx="4" fill="url(#bar)" opacity="0.7"/>
    <rect x="108" y="65" width="26" height="75" rx="4" fill="url(#bar)" opacity="0.85"/>
    <rect x="144" y="35" width="26" height="105" rx="4" fill="url(#bar)"/>
  </g>

  <!-- magnifying glass for EDA -->
  <g transform="translate(90,100)" stroke="#5eead4" stroke-width="6" fill="none">
    <circle cx="0" cy="0" r="34"/>
    <line x1="24" y1="24" x2="50" y2="50"/>
  </g>

  <text x="190" y="85" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#f0fdfa">Data Preprocessing &amp; EDA</text>
  <text x="190" y="120" font-family="Arial, sans-serif" font-size="20" fill="#99f6e4">Cleaning, encoding, scaling &amp; exploring the data</text>

  <rect x="190" y="140" width="560" height="4" rx="2" fill="url(#bar)"/>
</svg>
